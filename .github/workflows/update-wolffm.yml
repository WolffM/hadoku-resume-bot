name: Auto-update @wolffm packages

on:
  repository_dispatch:
    types: [wolffm_published]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # safety net every 6h

concurrency:
  group: update-wolffm
  cancel-in-progress: true

permissions:
  contents: write
  packages: read

jobs:
  update:
    runs-on: [self-hosted, hadoku-builder]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # pnpm via corepack, pinned by the `packageManager` field in package.json.
      # Replaces pnpm/action-setup, whose self-installer intermittently died on
      # this self-hosted runner with `ENOENT ... uv_cwd` (cwd removed mid-install).
      # No pnpm cache needed: the store is already warm on the persistent runner.
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.5.0 --activate
          pnpm --version

      - name: Configure .npmrc for GitHub Packages
        run: |
          echo "@wolffm:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.HADOKU_SITE_TOKEN }}" >> .npmrc

      - name: Update @wolffm/* within their semver range
        env:
          NODE_AUTH_TOKEN: ${{ secrets.HADOKU_SITE_TOKEN }}
        run: |
          pnpm --config.store-dir=${{ runner.tool_cache }}/pnpm-store update "@wolffm/*"


      # A major sitting outside the declared range is skipped above — by design,
      # since crossing it needs a migration. Report it so the skip is visible;
      # silence here is what let a breaking major land unnoticed everywhere.
      - name: Report @wolffm majors held back by semver
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.HADOKU_SITE_TOKEN }}
        run: |
          node -e '
            const {execSync}=require("child_process"), fs=require("fs");
            const seen=new Set(); let held=0;
            const manifests=execSync("git ls-files \"*package.json\"").toString().trim().split("\n");
            for (const m of manifests) {
              if (!m || m.includes("node_modules")) continue;
              let pkg; try { pkg=JSON.parse(fs.readFileSync(m,"utf8")); } catch { continue; }
              for (const field of ["dependencies","devDependencies"]) {
                for (const [name,range] of Object.entries(pkg[field]||{})) {
                  if (!name.startsWith("@wolffm/") || String(range).startsWith("workspace:")) continue;
                  if (seen.has(name)) continue; seen.add(name);
                  let latest; try {
                    latest=execSync(`npm view ${name} version --registry=https://npm.pkg.github.com`,{stdio:["ignore","pipe","ignore"]}).toString().trim();
                  } catch { continue; }
                  const cur=(String(range).match(/(\d+)/)||[])[1];
                  const next=(latest.match(/^(\d+)/)||[])[1];
                  if (cur && next && Number(next)>Number(cur)) {
                    held++;
                    console.log(`::warning::${name} ${latest} is available but held back — this repo declares ${range}. Crossing a major needs a deliberate migration; see the package CHANGELOG.`);
                  }
                }
              }
            }
            console.log(held ? `${held} @wolffm package(s) have a newer major held back by semver.` : "No @wolffm majors held back.");
          '
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -z "$(git status --porcelain)" ]; then
            echo "✅ No @wolffm package updates available"
            exit 0
          fi

          git add package.json pnpm-lock.yaml
          git commit -m "chore: auto-update @wolffm/* to latest"

          for i in 1 2 3; do
            if git push; then
              echo "✅ Pushed"
              exit 0
            fi
            echo "Push failed (attempt $i), rebasing..."
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
          done
          echo "❌ Push failed after retries"
          exit 1
